<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synthos — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e0e0e0;
    }

    .card {
      width: 100%;
      max-width: 400px;
      padding: 48px 40px;
      background: #111118;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      letter-spacing: -1px;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 600;
      color: #f0f0f0;
      letter-spacing: -0.3px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #f0f0f0;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 32px;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #9ca3af;
      margin-bottom: 6px;
      letter-spacing: 0.2px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #6366f1;
    }

    input::placeholder {
      color: #3d3d50;
    }

    .error {
      background: #2d1515;
      border: 1px solid #5c1a1a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #f87171;
      margin-bottom: 20px;
    }

    button[type="submit"] {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
    }

    button[type="submit"]:hover {
      opacity: 0.9;
    }

    .footer {
      margin-top: 28px;
      text-align: center;
      font-size: 12px;
      color: #3d3d50;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark">S</div>
      <span class="logo-text">Synthos</span>
    </div>

    <h1>Sign in</h1>
    <p class="subtitle">Access your trading dashboard</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="field">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        >
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        >
      </div>
      <button type="submit">Sign in</button>
    </form>

    <div class="footer">Synthos &copy; 2026 &mdash; Algorithmic Trading Platform</div>
  </div>
</body>
</html>
