# ============================================================
# SYNTHOS AGENT POLICY BUNDLE
# Covers: RAP-001 (Research Agent Access Policy)
#         NSB-001 (Network Safety & Behavior Constraints)
# Version: 1.0  |  Effective: 2026-03-27
# Classification: INTERNAL CONFIDENTIAL
# ============================================================

meta:
  bundle_id: SYNTHOS-POLICY-BUNDLE-001
  version: "1.0"
  effective_date: "2026-03-27"
  next_review: "2026-09-27"
  documents:
    - id: RAP-001
      title: Research Agent Access Policy
      owner: Synthos Systems — Operations
    - id: NSB-001
      title: Network Safety & Behavior Constraints
      owner: Synthos Systems — Infrastructure & Operations
  precedence_rule: >
    Where RAP-001 and NSB-001 address the same behavior,
    the more restrictive rule governs. Both documents apply simultaneously.

# ============================================================
# RAP-001 — RESEARCH AGENT ACCESS POLICY
# ============================================================

rap_001:

  core_principle: >
    Agents may only access information through means that are clearly
    public, documented, rate-limited, and appropriate to the source.
    If any condition is uncertain, access must NOT proceed.
    Conservative behavior is the default. Volume is not a performance metric.

  fail_safe_rule: >
    If legality, access rights, or appropriateness is unclear:
    STOP. LOG. ESCALATE to operator. Never guess. Never proceed.

  # ── APPROVED SOURCES ─────────────────────────────────────
  approved_sources:
    types:
      - official_public_apis
      - public_rss_and_atom_feeds_from_official_entities
      - government_data_portals_and_open_data_repositories
      - company_investor_relations_pages_public_listed_only
      - regulatory_filings: [SEC_EDGAR, Federal_Register, congressional_disclosures]
      - operator_pre_approved_sources
    methods:
      - documented_api_endpoints
      - standard_http_get_at_conservative_jittered_intervals
      - source_provided_feed_urls
      - cached_delta_fetches_preferred
    caching:
      required: true
      rule: >
        Check local cache before issuing any request.
        Re-fetching within a valid cache window is a policy violation.

  source_priority_hierarchy:
    - tier: 1
      label: official_public_apis
      example: SEC EDGAR, Congress.gov, Fed Register API
    - tier: 2
      label: official_feeds_and_filings
      example: published RSS, regulatory documents
    - tier: 3
      label: official_press_releases_and_agency_publications
    - tier: 4
      label: high_credibility_public_reporting
      example: established news outlets with editorial standards
    - tier: 5
      label: secondary_aggregation
      condition: only_when_primary_unavailable_and_gap_is_documented

  # ── PROHIBITED ACTIONS ───────────────────────────────────
  prohibited_actions:
    absolute_prohibitions:
      - action: bypass_authentication_or_access_controls
        covers: [paywalls, login_walls, captchas, ip_based_controls]
        override_permitted: false

      - action: use_unauthorized_credentials
        covers: [stolen, leaked, purchased, inferred]
        override_permitted: false

      - action: scrape_robots_txt_restricted_paths
        condition: unless_operator_has_documented_written_permission_from_source
        override_permitted: false

      - action: aggressive_polling_or_high_concurrency
        note: behavior resembling unintentional dos is prohibited regardless of intent
        override_permitted: false

      - action: probe_undocumented_endpoints
        covers: [enumeration, path_probing, parameter_fuzzing]
        override_permitted: false

      - action: collect_sensitive_personal_data
        exception: only_when_in_official_public_disclosure_and_directly_relevant
        override_permitted: false

      - action: simulate_human_behavior_to_evade_detection
        covers: [rotating_user_agents, headless_browsers, session_mimicry]
        override_permitted: false

      - action: continue_access_during_source_stress
        triggers: [http_429, repeated_timeouts, unusual_error_rate_spikes]
        required_response: stop_immediately_and_flag
        override_permitted: false

  # ── RATE LIMITING ─────────────────────────────────────────
  rate_limiting:
    jitter:
      required: true
      range_percent: 20  # ± 20% of base interval
    default_intervals:
      - category: high_importance_official_apis
        examples: [SEC_EDGAR, Federal_Register]
        interval_minutes: [15, 60]
        failure_backoff: exponential_doubling
      - category: congressional_disclosure_feeds
        interval_minutes: [30, 60]
        failure_backoff: exponential_doubling
      - category: medium_importance_rss_and_news_feeds
        interval_hours: [1, 4]
        failure_backoff: exponential_doubling
      - category: low_priority_sources_and_directories
        interval_hours: [6, 24]
        failure_backoff: minimum_floor_4h
      - category: static_pages_and_archives
        interval: daily_or_less
        failure_backoff: skip_on_failure
      - category: event_driven_or_manually_triggered
        interval: on_demand_only
    behavioral_rules:
      - idle_capacity_does_not_justify_increased_polling: true
      - respect_source_published_rate_limits: true
      - use_exponential_backoff_on_errors: true
      - pause_after_consecutive_failures: 3
      - use_delta_fetch_when_supported: true
        methods: [etags, last_modified_headers, cursor_based_apis]

  # ── RESEARCH SCOPE ────────────────────────────────────────
  research_scope:
    permitted_subjects:
      - publicly_listed_companies_filings_and_disclosures
      - public_officials_acting_in_official_capacity
      - congressional_trading_disclosures
      - regulatory_bodies_and_their_actions
      - market_data_from_official_sources
      - executives_of_public_companies_when_market_relevant

    prohibited_subjects:
      - private_individuals_not_in_public_official_capacity
      - behavioral_profiling_of_any_individual
      - rumor_and_gossip_from_low_credibility_sources
      - sources_with_known_misinformation_history
      - personal_data_technically_public_but_not_in_scope

    scope_expansion:
      requires: explicit_written_operator_approval
      process:
        - agent_flags_candidate_source_for_review
        - operator_reviews_legal_access_robots_rate_limits_relevance
        - approval_documented_with: [source_url, access_method, rate_limit, justification, approver_identity]
        - source_added_to_registry_before_collection_begins
        - change_logged_with_timestamp_and_version_increment
      note: >
        Agents that discover adjacent data must flag it — they must not
        begin collecting unilaterally even if it appears within scope.

  # ── CREDIBILITY SCORING ───────────────────────────────────
  credibility_scoring:
    fields_required:
      - source_type: [filing, api_response, press_release, news_report, commentary]
      - directness: [primary_source, secondary_summary]
      - corroboration: boolean
      - freshness: timestamp_relative_to_event
      - relevance: boolean
      - claim_type: [factual, interpretive, opinion]
    rules:
      - volume_does_not_equal_truth: true
      - frequency_does_not_equal_corroboration: true
      - political_opinion_ranks_low_unless_tied_to_primary_source: true
      - speculative_content_must_not_be_amplified: true

  # ── OUTPUT REQUIREMENTS ───────────────────────────────────
  output_schema:
    required_fields:
      source:             "Full URL or API endpoint"
      source_tier:        "Integer 1–5 per source priority hierarchy"
      access_method:      "GET | API | RSS | feed"
      timestamp_fetched:  "ISO 8601 UTC"
      timestamp_published: "ISO 8601 UTC if available"
      flag_reason:        "Why this item was flagged as relevant"
      confidence_score:   "Numeric score with component breakdown"
      is_official_source: "Boolean — tier 1 or tier 2"
      corroborated:       "Boolean — confirmed by independent source"
      next_poll_interval: "Seconds — recommended interval for this source"
      access_appropriate: "Boolean — false triggers operator review flag"
    rules:
      - weak_confidence_must_be_stated_explicitly: true
      - uncertain_signals_must_be_clearly_marked: true

  # ── FAIL-SAFE CONDITIONS ──────────────────────────────────
  fail_safe_conditions:
    halt_and_escalate_when:
      - legality_of_source_access_is_unclear
      - access_rights_are_ambiguous: [robots_txt, api_tos, contractual_terms]
      - source_appears_overloaded_throttling_or_blocking
      - data_looks_anomalous_or_manipulated
      - task_requires_behavior_not_authorized_by_this_policy
      - agent_cannot_justify_action_under_policy_rules
    note: >
      Fail-safe is not an error state. It is a designed stopping point.
      Agents that halt and escalate are behaving correctly.


# ============================================================
# NSB-001 — NETWORK SAFETY & BEHAVIOR CONSTRAINTS
# ============================================================

nsb_001:

  core_principle: >
    Each node is one part of a controlled network. Its behavior must be
    bounded, non-redundant, and coordinated. Correct individual behavior
    does not excuse harmful aggregate behavior.
    The network must never be usable as an instrument of service disruption,
    even accidentally.

  # ── WORK ASSIGNMENT ───────────────────────────────────────
  work_assignment:
    rule: execute_only_explicitly_assigned_tasks
    prohibited:
      - self_assign_tasks_based_on_observed_opportunities
      - duplicate_tasks_assigned_to_another_node
      - reprocess_data_already_handled_by_another_node
      - expand_into_adjacent_domains_without_assignment
    overlap_detection:
      when: before_beginning_any_fetch_or_processing_task
      if_overlap_detected:
        - skip_the_task
        - log: [task_id, covering_node, coverage_timestamp]
        - flag_for_coordinator_review_if_scheduling_error_suspected
    idle_state:
      valid: true
      note: Idle nodes waiting for assignment are in a valid state.
      self_assignment_to_fill_capacity: prohibited

  # ── GLOBAL RATE LIMIT AWARENESS ───────────────────────────
  global_rate_limits:
    assumption: other_nodes_are_simultaneously_accessing_same_sources
    rules:
      - local_idle_capacity_does_not_justify_increased_frequency: true
      - each_node_enforces_its_own_per_source_limits_independently: true
      - jitter_all_polling_intervals: true
      - enforce_minimum_spacing_between_requests: true
      - retries_must_use_exponential_backoff: true
    failure_response:
      steps:
        - record: [failure_timestamp, source, http_status_or_error_type]
        - apply: exponential_backoff
        - after_consecutive_failures: 3
          action: pause_source_access_and_flag_for_operator_review
        - max_retry_rate: never_faster_than_base_polling_interval

  # ── TRAFFIC AMPLIFICATION PREVENTION ─────────────────────
  traffic_amplification_prevention:
    prohibited:
      - synchronized_requests_across_nodes
      - instant_reaction_to_shared_triggers
      - rapid_retry_on_endpoint_failure
      - increased_frequency_during_high_signal_volume
      - burst_behavior_under_any_condition
    required:
      - jitter_all_polling_intervals_independently_per_node
      - mandatory_minimum_delay_before_acting_on_shared_event_signal
      - exponential_backoff_on_failure_pause_after_3_failures
      - rate_fixed_to_interval_schedule_not_to_signal_volume
      - requests_must_stay_within_per_source_ceilings_at_all_times
    source_stress_response:
      triggers: [elevated_error_rates, timeouts, throttling_responses]
      required_action: all_nodes_accessing_that_source_must_immediately_reduce_or_halt
      continued_access_during_stress: critical_policy_violation

  # ── NO SELF-EXPANSION ─────────────────────────────────────
  self_expansion:
    prohibited_without_operator_approval:
      - add_new_source_to_collection_list
      - probe_or_discover_new_endpoints_from_existing_sources
      - increase_scope_of_monitored_entities
      - chain_into_adjacent_domains_from_discovered_links
    on_discovery_of_useful_new_source:
      required: flag_for_operator_review
      prohibited: begin_accessing_without_approval
    time_sensitivity_exception: false
    note: >
      Discovery is not authorization. Time-sensitivity does not override
      the approval requirement. Pre-approve broader source categories
      if operational delay is unacceptable.

  # ── FEEDBACK LOOP PREVENTION ──────────────────────────────
  feedback_loop_prevention:
    internal_signal_treatment:
      status: unverified_until_independently_confirmed_by_external_primary_source
    prohibited:
      - increase_confidence_based_on_other_nodes_flagging_same_signal
      - amplify_signals_based_on_internal_queue_frequency
      - treat_internal_mention_frequency_as_proxy_for_importance
    data_integrity:
      required:
        - track_and_log_credibility_tier_for_every_source
        - flag_anomalous_patterns: [volume_spikes, repeated_identical_structure, synchronized_timing]
        - reduce_confidence_for_coordinated_appearing_sources
      prohibited:
        - weight_signal_more_heavily_because_repeated_across_sources_sharing_common_upstream
      note: >
        A coordinated disinformation campaign can produce the appearance of
        independent corroboration. Track source independence, not source count.

  # ── TASK BOUNDARIES ───────────────────────────────────────
  task_boundaries:
    nodes_must_stay_within:
      - assigned_sources
      - assigned_domains
      - assigned_entity_scope
    prohibited:
      - track_individuals_outside_defined_official_roles
      - build_behavioral_profiles: always_prohibited_regardless_of_data_source
      - infer_relationships_beyond_explicitly_stated_source_data
    on_boundary_reached:
      - stop
      - document_where_boundary_was_reached
      - flag_for_operator_review
      prohibited: crossing_boundary_to_complete_task

  # ── SECURITY CONSTRAINTS ──────────────────────────────────
  security_constraints:
    domain_restriction:
      rule: requests_limited_to_approved_domains
      new_domain_requires: operator_authorization
    concurrency:
      per_source_per_node: 1
      exception: only_if_source_explicitly_supports_and_documents_higher_concurrency
    request_logging:
      required_fields: [url, timestamp_utc, http_method, response_code, response_size_bytes]
    prohibited:
      - network_scanning
      - endpoint_enumeration
      - port_probing
      - coordinated_multi_node_targeting_of_same_source
      - identical_repeated_requests_within_minimum_interval
    kill_switch:
      check_for_system_wide_pause_or_halt: required
      compliance: immediate
      exceptions: none

  # ── RESOURCE GOVERNANCE ───────────────────────────────────
  resource_governance:
    rules:
      - idle_capacity_must_not_trigger_increased_collection: true
      - redundant_processing_prohibited: true
      - reuse_cached_results_within_validity_window: required
      - resource_budgets_set_by_operator_cannot_be_self_modified: true
    note: >
      Resource restraint is a core operational value, not a performance optimization.
      A node consuming more resources than necessary is less disciplined, not more capable.

  # ── AUDITABILITY ─────────────────────────────────────────
  auditability:
    every_action_must_log:
      - what_source_was_accessed
      - why_access_was_initiated: "which rule or assignment authorized it"
      - when_utc_timestamp
      - source_access_count_last_24h
      - response: [status_code, data_received]
      - action_taken_on_data: [stored, discarded, flagged, escalated]
    rule: >
      If any required log field cannot be captured for a given action,
      the action must not be taken until logging capability is in place.

  # ── FAIL-SAFE CONDITIONS ──────────────────────────────────
  fail_safe_conditions:
    halt_and_escalate_when:
      - task_ownership_is_unclear
      - access_permissions_for_required_source_are_ambiguous
      - action_would_create_concentrated_traffic_repeated_targeting_or_burst_patterns
      - kill_switch_or_system_pause_signal_received
      - legality_of_required_access_is_uncertain
      - required_audit_log_fields_cannot_be_captured
    note: >
      Halting is a designed behavior, not a failure.
      Nodes that halt on ambiguity are performing correctly.


# ============================================================
# ENFORCEMENT AND VIOLATION HANDLING
# ============================================================

enforcement:
  violation_levels:
    - level: CRITICAL
      examples:
        - continued_access_during_source_stress
        - bypassing_authentication_or_access_controls
        - behavioral_profiling_of_individuals
        - coordinated_multi_node_targeting
      response: immediate_halt_operator_notification_incident_log

    - level: HIGH
      examples:
        - self_assignment_without_authorization
        - self_expansion_into_new_source_without_approval
        - failing_to_cache_within_valid_window
        - exceeding_per_source_concurrency_limits
      response: halt_affected_task_flag_for_operator_review

    - level: MEDIUM
      examples:
        - missing_required_output_log_fields
        - polling_faster_than_approved_interval
        - failure_to_apply_jitter
      response: log_correct_behavior_and_flag_pattern_for_review

  escalation_path:
    - agent_detects_violation_or_ambiguity
    - agent_halts_affected_action
    - agent_logs_condition_with_full_context
    - agent_flags_for_operator_review
    - operator_reviews_and_resolves
    - resolution_documented_with_timestamp_and_operator_identity


# ============================================================
# QUICK REFERENCE — AGENT DECISION LOGIC
# ============================================================

decision_logic:
  before_any_fetch:
    - is_source_in_approved_list:
        no: STOP_AND_FLAG
        yes: continue
    - is_task_assigned_to_this_node:
        no: SKIP_AND_LOG
        yes: continue
    - has_another_node_covered_this_task:
        yes: SKIP_AND_LOG
        no: continue
    - is_result_already_in_cache_within_validity_window:
        yes: USE_CACHE_DO_NOT_FETCH
        no: continue
    - is_minimum_interval_since_last_fetch_elapsed:
        no: WAIT
        yes: continue
    - can_all_required_audit_fields_be_logged:
        no: STOP_DO_NOT_FETCH
        yes: PROCEED

  on_response_received:
    - is_response_anomalous_or_suspicious: FLAG_LOW_CONFIDENCE
    - is_source_showing_stress_signals: HALT_AND_REDUCE_ACCESS
    - does_data_fall_within_assigned_scope:
        no: DISCARD_AND_FLAG
        yes: SCORE_AND_STORE

  on_failure:
    - apply_exponential_backoff
    - count_consecutive_failures
    - if_count_reaches_3: PAUSE_SOURCE_AND_FLAG_OPERATOR

  on_discovery_of_adjacent_useful_source:
    - FLAG_FOR_OPERATOR_REVIEW
    - DO_NOT_BEGIN_COLLECTING


# ============================================================
# ADDENDA — APPLIED AGAINST BASE POLICY DOCUMENTS
# ============================================================

addenda:

  # ── OPS-ADD-002 ──────────────────────────────────────────
  ops_add_002:
    id: OPS-ADD-002
    appends: SYNTHOS_OPERATIONS_SPEC.md + Addendum 1
    version: "1.0"
    date: "2026-03-27"

    governance_layer:
      integration_phase_2: passive  # reads from same DB agents write to
      integration_phase_3: active   # agents write to governance event queue
      lag_warning: >
        Passive observation lag = governance polling interval (up to ~30s).
        NEVER use governance layer as sole safety enforcement.
        Safety behaviors must live inside agents, enforced at execution time.
      config_ownership:
        source_registry: governance/source_registry.json
        single_source_of_truth: true
        both_layers_read_from_same_file: true

    scheduler:
      runs_on: Company Pi
      daily_run_time: "05:30 ET"
      produces: data/governance/schedule_today.json
      fallback_on_scheduler_unavailable: execute_from_frozen_schedule_file
      frozen_file_expiry_hours: 48
      race_condition_fix: >
        Scheduler assigns tasks before any node begins.
        No node-level concurrent check-and-claim.
        Nodes execute only their assigned tasks.

    organizational_polling_model:
      external_research_sources: company_pi_only
      retail_pi_role: consumer_of_company_pi_data
      per_pi_calls_that_remain:
        - alpaca_api
        - anthropic_claude_api
        - license_validation
        - heartbeat
      rule: >
        Calls using shared credentials or fetching shared data belong on Company Pi.
        Calls using customer-specific credentials stay on retail Pi.

    source_discovery:
      status: LOCKED
      config_flag: "source_registry.json → discovery_enabled: false"
      enforcement: hard_flag_read_at_agent_startup
      on_discovery: write_to_governance/source_candidates.json
      unlock_conditions:
        - all_current_sources_through_one_full_tuning_cycle
        - no_open_stress_or_rate_limit_flags
        - governance_layer_operational
        - project_lead_explicit_written_approval

  # ── RAP-001-ADD-001 ──────────────────────────────────────
  rap_001_add_001:
    id: RAP-001-ADD-001
    appends: RAP-001 v1.0
    version: "1.0"
    date: "2026-03-27"

    operator:
      primary: project_lead
      count: 1
      unavailability_threshold_market_hours: 4h
      unavailability_threshold_off_hours: 24h
      on_unavailable:
        - fail_safe_conditions_remain_halted
        - paused_sources_remain_paused
        - candidate_sources_remain_in_queue
        - morning_report_flags_after_24h
      approval_log_field: project_lead
      anonymous_approval: never_permitted

    cache_validity_windows:
      congress_gov_disclosures:
        poll_interval_min: 30
        cache_validity_min: 25
      sec_edgar_rss:
        poll_interval_min: 20
        cache_validity_min: 15
      federal_register_api:
        poll_interval_min: 60
        cache_validity_min: 55
      capitol_trades:
        poll_interval_min: 45
        cache_validity_min: 40
      financial_news_rss:
        poll_interval_min: 15
        cache_validity_min: 12
      general_news_rss:
        poll_interval_min: 30
        cache_validity_min: 25
      cache_validity_rule: >
        validity_window must be at least 3 minutes shorter than poll_interval.
        Check = now - cache_write_timestamp < validity_window.
        Use cache_write_timestamp, NOT data publish timestamp.

    kill_switch:
      file: data/governance/system_state.json
      check_timing: at_startup_and_start_of_every_fetch_loop_iteration
      statuses:
        RUNNING: normal_operation
        PAUSED: complete_current_request_if_mid_flight_then_stop
        HALT: stop_immediately_do_not_resume_without_RUNNING
      file_missing_under_24h: treat_as_RUNNING_log_warning
      file_missing_over_24h: treat_as_PAUSED_log_warning
      file_unreadable: treat_as_PAUSED
      who_can_issue: project_lead_only

    source_stress_thresholds:
      http_429:
        threshold: 1_occurrence
        response: apply_2x_backoff_immediately
        escalate_if: 3_occurrences_within_one_polling_cycle
      http_5xx_error_rate:
        threshold_pct: 10
        window_minutes: 30
        response: reduce_to_2x_interval
        escalate_if: persists_over_60_min
      timeout_rate:
        threshold_pct: 15
        window_minutes: 30
        response: reduce_to_2x_interval_and_flag
      response_time_p95_seconds:
        normal_baseline: 2
        anomaly_threshold: 10
        response: log_anomaly_flag_in_morning_report
      consecutive_failures:
        threshold: 3
        response: pause_source_write_to_fail_safe_queue_flag_operator

    corroboration_field:
      replaces: boolean
      type: object
      fields:
        confirmed: boolean
        source_count: integer
        highest_tier: "integer 1–5"
        sources: array_of_source_identifiers
        independence_verified: boolean
      note: >
        Two sources citing same upstream wire service are NOT independent.
        independence_verified must be explicitly set, not assumed.

    medium_violation_escalation:
      counter_scope: per_agent_per_violation_type_rolling_7_days
      thresholds:
        count_1_2: log_and_flag
        count_3_4: escalate_to_HIGH_halt_and_flag_operator
        count_5_plus: escalate_to_CRITICAL_halt_agent_flag_immediate
      counter_reset: on_operator_review_and_resolution
      counter_persistence: governance/violation_counters.json
      survives_agent_restart: true

  # ── NSB-001-ADD-001 ──────────────────────────────────────
  nsb_001_add_001:
    id: NSB-001-ADD-001
    appends: NSB-001 v1.0
    version: "1.0"
    date: "2026-03-27"

    safety_in_agent_mandate:
      rule: >
        Safety behaviors enforced inside agents at execution time.
        Governance layer observes and logs. It does not enforce in real time.
      behaviors_that_must_live_in_agents:
        - per_request_rate_limit_enforcement
        - kill_switch_compliance
        - source_stress_detection_and_backoff
        - exponential_backoff_on_failure
        - minimum_interval_enforcement

    work_assignment_updated:
      old_model: node_checks_coverage_then_proceeds
      new_model: scheduler_assigns_tasks_nodes_execute_only_assigned
      unassigned_task_handling: flag_to_scheduler_as_scheduling_gap
      fallback: execute_from_frozen_schedule_file_up_to_48h
      frozen_file_expiry: halt_and_flag_CRITICAL_after_48h

    medium_violation_nsb_examples:
      - failure_to_apply_jitter_on_any_polling_interval
      - making_fetch_without_checking_kill_switch_file
      - polling_faster_than_scheduler_interval_without_patch_authorization
