<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0c14;color:rgba(255,255,255,0.88);font-family:'Inter',system-ui,sans-serif;font-size:14px;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:99px}

.cust-tabs-wrap{max-width:1200px;margin:0 auto;padding:18px 24px 0}
.cust-tabs{display:flex;gap:4px;border-bottom:1px solid rgba(255,255,255,0.08)}
.cust-tab{
  padding:9px 18px;border-radius:8px 8px 0 0;font-size:11px;font-weight:600;
  background:transparent;border:none;color:rgba(255,255,255,0.5);
  cursor:pointer;font-family:inherit;letter-spacing:0.06em;text-transform:uppercase;
  transition:all 0.15s;
  border-bottom:2px solid transparent;
  margin-bottom:-1px;
}
.cust-tab:hover{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.8)}
.cust-tab.active{background:rgba(0,245,212,0.06);color:#00f5d4;border-bottom-color:#00f5d4}
.cust-panel{display:none}
.cust-panel.active{display:block}
</style>

<div class="cust-tabs-wrap">
  <div class="cust-tabs">
    <button class="cust-tab" data-tab="approvals">Approvals</button>
    <button class="cust-tab" data-tab="support">Support</button>
    <button class="cust-tab" data-tab="activity">Activity</button>
    <button class="cust-tab" data-tab="billing">Billing</button>
  </div>
</div>

<div class="cust-panel" id="cust-panel-approvals">
  {% include 'customers/approvals.html' %}
</div>
<div class="cust-panel" id="cust-panel-support">
  {% include 'customers/support.html' %}
</div>
<div class="cust-panel" id="cust-panel-activity">
  {% include 'customers/activity.html' %}
</div>
<div class="cust-panel" id="cust-panel-billing">
  {% include 'customers/billing.html' %}
</div>

<script>
(function(){
  // Tab order matches operational priority: action items first
  // (Approvals, Support), then review (Activity), then admin (Billing).
  const VALID = ['approvals','support','activity','billing'];
  const DEFAULT_TAB = 'approvals';

  function activate(tab){
    if (!VALID.includes(tab)) tab = DEFAULT_TAB;
    document.querySelectorAll('.cust-tab').forEach(function(b){
      b.classList.toggle('active', b.dataset.tab === tab);
    });
    document.querySelectorAll('.cust-panel').forEach(function(p){
      p.classList.toggle('active', p.id === 'cust-panel-' + tab);
    });
    if (window.location.hash !== '#' + tab) {
      history.replaceState(null, '', '#' + tab);
    }
  }

  document.querySelectorAll('.cust-tab').forEach(function(b){
    b.addEventListener('click', function(){ activate(b.dataset.tab); });
  });
  window.addEventListener('hashchange', function(){
    activate((window.location.hash || '').slice(1) || DEFAULT_TAB);
  });
  activate((window.location.hash || '').slice(1) || DEFAULT_TAB);
})();
</script>
