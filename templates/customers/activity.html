<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0c14;color:rgba(255,255,255,0.88);font-family:'Inter',system-ui,sans-serif;font-size:14px;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:99px}
.ca-wrap{max-width:1200px;margin:0 auto;padding:20px 24px}
.ca-h{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.ca-h::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.07)}
.ca-h-meta{font-size:10px;font-weight:500;color:rgba(255,255,255,0.3);text-transform:none;letter-spacing:0;margin-left:auto;font-family:'JetBrains Mono',monospace}

/* ── Customer Directory (Phase A) ───────────────────────────────────── */
.ca-dir{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:0;margin-bottom:24px;overflow:auto}
.ca-dir-empty{padding:40px;text-align:center;color:rgba(255,255,255,0.3);font-size:12px}
.ca-dir-table{width:100%;border-collapse:collapse;font-size:12px;table-layout:auto}
.ca-dir-table thead th{
  text-align:left;padding:10px 9px;border-bottom:1px solid rgba(255,255,255,0.08);
  font-weight:600;color:rgba(255,255,255,0.4);font-size:9px;text-transform:uppercase;letter-spacing:0.08em;
  background:rgba(255,255,255,0.02);position:sticky;top:0;white-space:nowrap;
}
.ca-dir-table tbody td{padding:9px 9px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle}
.ca-dir-table tbody tr:hover td{background:rgba(255,255,255,0.025)}
.ca-dir-table tbody tr:last-child td{border-bottom:none}
/* Per-column width hints. Email can be long; clip with ellipsis instead
   of letting it push UUID off-screen. UUID + Joined + Plan + Status +
   Trading all stay nowrap so they never wrap or truncate. */
.ca-dir-table th.col-email,.ca-dir-table td.col-email{max-width:240px}
.ca-dir-table th.col-uuid,.ca-dir-table td.col-uuid{white-space:nowrap;min-width:108px}
.ca-dir-table th.col-joined,.ca-dir-table td.col-joined{white-space:nowrap;min-width:90px}
.ca-dir-table th.col-plan,.ca-dir-table td.col-plan,
.ca-dir-table th.col-status,.ca-dir-table td.col-status,
.ca-dir-table th.col-trading,.ca-dir-table td.col-trading,
.ca-dir-table th.col-alpaca,.ca-dir-table td.col-alpaca,
.ca-dir-table th.col-msg,.ca-dir-table td.col-msg{white-space:nowrap}
.ca-dir-name{font-weight:600;color:rgba(255,255,255,0.95);font-size:13px;white-space:nowrap}
.ca-dir-email{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,0.6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;max-width:240px}
.ca-dir-uuid{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,0.3);cursor:pointer;white-space:nowrap}
.ca-dir-uuid:hover{color:rgba(255,255,255,0.6)}
.ca-dir-uuid.copied{color:#00f5d4}
.ca-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:99px;font-size:10px;font-weight:600;letter-spacing:0.04em;font-family:inherit;line-height:1.6}
.ca-pill-tier{background:rgba(123,97,255,0.08);border:1px solid rgba(123,97,255,0.25);color:#a78bfa}
.ca-pill-active{background:rgba(0,245,212,0.06);border:1px solid rgba(0,245,212,0.22);color:#00f5d4}
.ca-pill-trial{background:rgba(123,97,255,0.06);border:1px solid rgba(123,97,255,0.22);color:#a78bfa}
.ca-pill-past{background:rgba(245,166,35,0.07);border:1px solid rgba(245,166,35,0.25);color:#f5a623}
.ca-pill-cancel{background:rgba(255,75,110,0.06);border:1px solid rgba(255,75,110,0.22);color:#ff4b6e}
.ca-pill-mute{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.45)}
.ca-pill-paper{background:rgba(123,97,255,0.06);border:1px solid rgba(123,97,255,0.2);color:#a78bfa}
.ca-pill-live{background:rgba(0,245,212,0.07);border:1px solid rgba(0,245,212,0.25);color:#00f5d4}
.ca-check{display:inline-block;width:14px;height:14px;border-radius:99px;text-align:center;font-size:9px;line-height:14px;font-weight:700}
.ca-check-yes{background:rgba(0,245,212,0.15);color:#00f5d4}
.ca-check-no{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.3)}
.ca-msg-btn{
  background:rgba(0,245,212,0.06);border:1px solid rgba(0,245,212,0.22);color:#00f5d4;
  border-radius:6px;padding:5px 11px;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;
  cursor:not-allowed;opacity:0.4;font-family:inherit;
}
.ca-msg-btn[disabled]:hover::after{
  content:'Phase C';position:absolute;background:#0a0c14;color:rgba(255,255,255,0.7);
  border:1px solid rgba(255,255,255,0.1);padding:2px 6px;border-radius:4px;font-size:9px;
  margin-top:18px;margin-left:-30px;
}
.ca-dir-relative{font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px}

/* ── Customer Activity Report (existing, reorganized) ──────────────── */
.ca-form{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:16px;margin-bottom:18px}
.ca-form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;align-items:end;margin-bottom:14px}
.ca-form label{display:block;font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
.ca-form input,.ca-form select{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:8px 10px;color:rgba(255,255,255,0.88);font-family:'JetBrains Mono',monospace;font-size:12px}
.ca-form input:focus,.ca-form select:focus{outline:none;border-color:rgba(0,245,212,0.4)}
.ca-form button.ca-run{background:rgba(0,245,212,0.1);border:1px solid rgba(0,245,212,0.3);color:#00f5d4;border-radius:6px;padding:8px 18px;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;font-family:inherit}
.ca-form button.ca-run:hover{background:rgba(0,245,212,0.18)}
.ca-presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.ca-presets button{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);font-size:10px;padding:5px 10px;border-radius:5px;cursor:pointer;font-family:inherit;letter-spacing:0;text-transform:none}
.ca-presets button:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.88)}
.ca-form-actions{display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.06)}
.ca-customer-list{max-height:280px;overflow-y:auto;border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:6px;background:rgba(255,255,255,0.02)}
.ca-customer-list label{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:4px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,0.6);text-transform:none;letter-spacing:0;margin:0}
.ca-customer-list label:hover{background:rgba(255,255,255,0.04)}
.ca-customer-list input[type=checkbox]{margin-right:4px;width:auto}
.ca-customer-list .ca-bulk{padding:4px 6px;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:4px;display:flex;gap:8px}
.ca-customer-list .ca-bulk a{font-size:10px;color:rgba(0,245,212,0.7);text-decoration:none;cursor:pointer}
.ca-customer-list .ca-bulk a:hover{color:#00f5d4}
.ca-out{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:14px;margin-bottom:14px}
.ca-customer-block{margin-bottom:18px;padding:12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px}
.ca-cust-h{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.06)}
.ca-cust-name{font-size:14px;font-weight:600;color:rgba(255,255,255,0.95)}
.ca-cust-cid{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,0.3)}
.ca-stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:10px}
.ca-stat{padding:8px 10px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:6px}
.ca-stat-label{font-size:9px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px}
.ca-stat-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700}
.ca-pos{color:#00f5d4}.ca-neg{color:#ff4b6e}.ca-mut{color:rgba(255,255,255,0.5)}
.ca-table{width:100%;border-collapse:collapse;font-size:11px;font-family:'JetBrains Mono',monospace;margin-top:6px}
.ca-table th{text-align:left;padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.1);font-weight:600;color:rgba(255,255,255,0.4);font-size:10px;text-transform:uppercase;letter-spacing:0.06em}
.ca-table td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,0.04);color:rgba(255,255,255,0.85)}
.ca-table tr:hover td{background:rgba(255,255,255,0.02)}
.ca-section-h{font-size:10px;font-weight:700;color:rgba(255,255,255,0.55);letter-spacing:0.08em;text-transform:uppercase;margin:14px 0 6px}
.ca-empty{text-align:center;padding:30px;color:rgba(255,255,255,0.25);font-size:12px}
.ca-cluster{padding:10px 12px;background:rgba(245,166,35,0.06);border:1px solid rgba(245,166,35,0.2);border-radius:6px;margin-bottom:6px}
.ca-cluster-header{font-size:11px;font-weight:600;color:#f5a623;margin-bottom:4px}
.ca-tools{display:flex;gap:8px;justify-content:flex-end;margin-bottom:8px}
.ca-tools button{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);font-size:10px;padding:4px 10px;border-radius:4px;cursor:pointer;font-family:inherit;letter-spacing:0.04em}
.ca-tools button:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.88)}
</style>

<div class="ca-wrap">

  <!-- ═══════════════════════════════════════════════════════════════════
       CUSTOMER DIRECTORY (Phase A)
       Top-of-tab snapshot of every customer with key fields. Future-home
       for one-click messaging (Phase C). Independent of the report below.
       ═══════════════════════════════════════════════════════════════════ -->
  <div class="ca-h">
    Customer Directory
    <span class="ca-h-meta" id="ca-dir-count">—</span>
  </div>
  <div class="ca-dir" id="ca-dir-wrap">
    <div class="ca-dir-empty" id="ca-dir-loading">Loading customer list…</div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════
       CUSTOMER ACTIVITY REPORT (existing tool, reorganized layout)
       Date controls + presets + Run Report up top, customer multi-select
       sized larger below. Future report types can stack alongside this.
       ═══════════════════════════════════════════════════════════════════ -->
  <div class="ca-h">Customer Activity Report</div>

  <form class="ca-form" id="ca-form" onsubmit="return runCAReport(event)">
    <div class="ca-form-row">
      <div>
        <label>Start date</label>
        <input type="date" id="ca-start" required>
      </div>
      <div>
        <label>End date</label>
        <input type="date" id="ca-end" required>
      </div>
    </div>

    <div class="ca-presets">
      <button type="button" onclick="caPreset('today')">Today</button>
      <button type="button" onclick="caPreset('yesterday')">Yesterday</button>
      <button type="button" onclick="caPreset('this_week')">This week</button>
      <button type="button" onclick="caPreset('last_week')">Last week</button>
      <button type="button" onclick="caPreset('mtd')">MTD</button>
      <button type="button" onclick="caPreset('since_baseline')">Since 2026-04-23</button>
    </div>

    <div class="ca-form-actions">
      <button type="submit" class="ca-run">Run report</button>
    </div>

    <div>
      <label>Customers</label>
      <div class="ca-customer-list" id="ca-customers">
        <div class="ca-bulk">
          <a onclick="caCustToggle(true)">all</a>
          <a onclick="caCustToggle(false)">none</a>
        </div>
        <label><input type="checkbox" value="owner" checked> owner only (Patrick)</label>
        <label><input type="checkbox" value="all"> ALL customers</label>
        <div id="ca-customer-checkboxes"><div style="font-size:10px;color:rgba(255,255,255,0.3);padding:4px">loading customer list...</div></div>
      </div>
    </div>
  </form>

  <div id="ca-output">
    <div class="ca-empty">Pick a date range + customers above and click "Run report".</div>
  </div>
</div>

<script>
const SECRET_TOKEN = '{{ secret_token }}';

// Cache the directory fetch so the report's customer multi-select can
// reuse it without a second HTTP round-trip.
let _caDirCustomers = null;

function ymd(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+dd;
}

function caPreset(kind){
  const today = new Date();
  let s, e;
  if (kind === 'today')         { s = today; e = today; }
  else if (kind === 'yesterday'){ s = new Date(today); s.setDate(today.getDate()-1); e = s; }
  else if (kind === 'this_week'){
    s = new Date(today);
    const dow = today.getDay() || 7; // Mon=1..Sun=7 → 7
    s.setDate(today.getDate() - (dow-1));
    e = today;
  } else if (kind === 'last_week'){
    e = new Date(today); const dow = today.getDay() || 7; e.setDate(today.getDate() - dow);
    s = new Date(e); s.setDate(e.getDate() - 6);
  } else if (kind === 'mtd'){
    s = new Date(today.getFullYear(), today.getMonth(), 1); e = today;
  } else if (kind === 'since_baseline'){
    s = new Date('2026-04-23'); e = today;
  }
  document.getElementById('ca-start').value = ymd(s);
  document.getElementById('ca-end').value   = ymd(e);
}

function caCustToggle(on){
  document.querySelectorAll('#ca-customer-checkboxes input').forEach(cb=>cb.checked=on);
}

// ── DIRECTORY ─────────────────────────────────────────────────────────
// Pretty-format helpers for the directory table.
function fmtRelativeDate(iso){
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '—';
  const days = Math.floor((Date.now() - d.getTime()) / 86400000);
  if (days < 1) return 'today';
  if (days === 1) return '1 day ago';
  if (days < 30) return days + ' days ago';
  if (days < 365) return Math.floor(days/30) + ' mo ago';
  return Math.floor(days/365) + 'y ago';
}

function fmtTier(tier){
  if (!tier) return '<span class="ca-pill ca-pill-mute">—</span>';
  const label = tier.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase());
  return '<span class="ca-pill ca-pill-tier">' + label + '</span>';
}

function fmtStatus(status){
  if (!status) return '<span class="ca-pill ca-pill-mute">—</span>';
  const cls = status === 'active'    ? 'ca-pill-active'
            : status === 'trialing'  ? 'ca-pill-trial'
            : status === 'past_due'  ? 'ca-pill-past'
            : status === 'cancelled' ? 'ca-pill-cancel'
            : 'ca-pill-mute';
  return '<span class="ca-pill ' + cls + '">' + status.replace(/_/g,' ') + '</span>';
}

function fmtTradingMode(mode){
  if (!mode) return '<span class="ca-pill ca-pill-mute">—</span>';
  const cls = mode === 'LIVE' ? 'ca-pill-live' : 'ca-pill-paper';
  return '<span class="ca-pill ' + cls + '">' + mode + '</span>';
}

function escHtml(s){
  return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

async function copyUuid(el){
  const uuid = el.getAttribute('data-uuid');
  if (!uuid) return;
  try {
    await navigator.clipboard.writeText(uuid);
    el.classList.add('copied');
    const orig = el.textContent;
    el.textContent = 'copied!';
    setTimeout(() => { el.classList.remove('copied'); el.textContent = orig; }, 1100);
  } catch(e) { /* swallow */ }
}

async function loadDirectory(){
  // Reuse cache if already fetched (avoids a second call from the report
  // form's loadCustomerList shim below).
  if (_caDirCustomers === null) {
    try {
      const r = await fetch('/api/proxy/billing/all-customers', {headers:{'X-Token':SECRET_TOKEN}});
      if (!r.ok) throw new Error('billing fetch '+r.status);
      const d = await r.json();
      _caDirCustomers = (d.customers || []).filter(c => c.id);
    } catch(e) {
      _caDirCustomers = [];
      const wrap = document.getElementById('ca-dir-wrap');
      wrap.innerHTML = '<div class="ca-dir-empty" style="color:#ff4b6e">Failed to load customer list — ' + escHtml(String(e)) + '</div>';
      return;
    }
  }
  const custs = _caDirCustomers;
  const wrap = document.getElementById('ca-dir-wrap');
  document.getElementById('ca-dir-count').textContent =
    custs.length + ' customer' + (custs.length === 1 ? '' : 's');

  if (!custs.length) {
    wrap.innerHTML = '<div class="ca-dir-empty">No customers yet.</div>';
    return;
  }

  // Sort by created_at descending (newest first) — operator-friendly default.
  custs.sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));

  const rows = custs.map(c => {
    const name = c.name || '(unnamed)';
    const email = c.email || '—';
    const uuid = c.id || '';
    const uuidShort = uuid ? uuid.slice(0,8) + '…' : '—';
    return `
      <tr>
        <td><div class="ca-dir-name">${escHtml(name)}</div></td>
        <td class="col-email"><div class="ca-dir-email" title="${escHtml(email)}">${escHtml(email)}</div></td>
        <td class="col-plan">${fmtTier(c.pricing_tier)}</td>
        <td class="col-status">${fmtStatus(c.subscription_status)}</td>
        <td class="col-trading">${fmtTradingMode(c.trading_mode)}</td>
        <td class="col-alpaca"><span class="ca-check ${c.has_alpaca ? 'ca-check-yes' : 'ca-check-no'}">${c.has_alpaca ? '✓' : '✗'}</span></td>
        <td class="col-joined"><div style="font-size:11px;color:rgba(255,255,255,0.7)">${fmtRelativeDate(c.created_at)}</div></td>
        <td class="col-uuid"><span class="ca-dir-uuid" data-uuid="${escHtml(uuid)}" onclick="copyUuid(this)" title="${escHtml(uuid)}">${escHtml(uuidShort)}</span></td>
        <td class="col-msg"><button class="ca-msg-btn" onclick="openComposeModal('${escHtml(uuid)}', '${escHtml(name)}', '${escHtml(email)}')" title="Send admin → customer message">Message</button></td>
      </tr>
    `;
  }).join('');

  wrap.innerHTML = `
    <table class="ca-dir-table">
      <thead>
        <tr>
          <th>Name</th>
          <th class="col-email">Email</th>
          <th class="col-plan">Plan</th>
          <th class="col-status">Status</th>
          <th class="col-trading">Trading</th>
          <th class="col-alpaca">Alpaca</th>
          <th class="col-joined">Joined</th>
          <th class="col-uuid">UUID</th>
          <th class="col-msg"></th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

// ── REPORT FORM (existing customer multi-select, fed from cache) ─────
async function loadCustomerList(){
  // Wait for the directory's fetch to land, then mirror its customers
  // into the report's checkbox multi-select.
  if (_caDirCustomers === null) {
    // Race: directory not loaded yet. Trigger the fetch and reuse the cache.
    await loadDirectory();
  }
  const custs = _caDirCustomers || [];
  const el = document.getElementById('ca-customer-checkboxes');
  if (!custs.length) { el.innerHTML = '<div style="font-size:10px;color:rgba(255,255,255,0.3);padding:4px">no customers found</div>'; return; }
  el.innerHTML = custs.map(c => {
    const name = c.name || c.email || c.id.slice(0,8);
    return `<label><input type="checkbox" value="${escHtml(c.id)}"> ${escHtml(name)} <span style="color:rgba(255,255,255,0.3);margin-left:auto">${escHtml(c.id.slice(0,8))}</span></label>`;
  }).join('');
}

function fmtDollar(n, sign){
  if (n === null || n === undefined) return '—';
  const abs = Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  if (sign) return (n >= 0 ? '+' : '-') + '$' + abs;
  return '$' + abs;
}

function fmtPct(n){
  if (n === null || n === undefined) return '—';
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}

function classOf(n){ return n > 0 ? 'ca-pos' : (n < 0 ? 'ca-neg' : 'ca-mut'); }

function renderCustomerBlock(cr){
  const a = cr.activity, p = cr.positions;
  const equity = (a.equity_start !== null && a.equity_end !== null)
    ? `<div class="ca-stat"><div class="ca-stat-label">Equity</div><div class="ca-stat-val ${classOf(a.equity_change||0)}">${fmtDollar(a.equity_start)} → ${fmtDollar(a.equity_end)}</div><div style="font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px">${fmtDollar(a.equity_change, true)} (${fmtPct(a.equity_change_pct)})</div></div>`
    : `<div class="ca-stat"><div class="ca-stat-label">Equity</div><div class="ca-stat-val ca-mut">no snapshots</div></div>`;
  const stats = `
    ${equity}
    <div class="ca-stat"><div class="ca-stat-label">Trades opened</div><div class="ca-stat-val">${a.opened_count}</div><div style="font-size:10px;color:rgba(255,255,255,0.4)">${fmtDollar(a.opened_volume)}</div></div>
    <div class="ca-stat"><div class="ca-stat-label">Trades closed</div><div class="ca-stat-val">${a.closed_count}</div><div style="font-size:10px;color:rgba(255,255,255,0.4)">${a.wins}W / ${a.losses}L · ${a.win_rate_pct}%</div></div>
    <div class="ca-stat"><div class="ca-stat-label">Realized P&amp;L</div><div class="ca-stat-val ${classOf(a.realized_pnl)}">${fmtDollar(a.realized_pnl, true)}</div></div>
    <div class="ca-stat"><div class="ca-stat-label">Open at end</div><div class="ca-stat-val">${a.open_count}</div><div style="font-size:10px;color:rgba(255,255,255,0.4)">${fmtDollar(a.open_value)}</div></div>
  `;
  let closedTable = '';
  if (p.closed && p.closed.length) {
    const rows = p.closed.slice(0,30).map(t => `
      <tr>
        <td>${t.ticker}</td>
        <td style="color:rgba(255,255,255,0.5)">${t.sector || '—'}</td>
        <td style="text-align:right">${(t.shares||0).toFixed(2)}</td>
        <td style="text-align:right">${fmtDollar(t.entry)}</td>
        <td style="text-align:right">${fmtDollar(t.exit)}</td>
        <td style="text-align:right" class="${classOf(t.pnl)}">${fmtDollar(t.pnl, true)}</td>
        <td style="text-align:right" class="${classOf(t.pnl)}">${fmtPct(t.ret_pct)}</td>
        <td style="text-align:right">${t.days_held !== null ? t.days_held.toFixed(1) + 'd' : '—'}</td>
        <td style="color:rgba(255,255,255,0.5)">${t.exit_reason || '—'}</td>
      </tr>
    `).join('');
    closedTable = `
      <div class="ca-section-h">Closed trades (${p.closed.length})</div>
      <table class="ca-table">
        <thead><tr><th>Ticker</th><th>Sector</th><th style="text-align:right">Shares</th><th style="text-align:right">Entry</th><th style="text-align:right">Exit</th><th style="text-align:right">P&amp;L</th><th style="text-align:right">Return</th><th style="text-align:right">Held</th><th>Exit</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }
  let sectorTable = '';
  if (p.sectors && p.sectors.length) {
    sectorTable = `
      <div class="ca-section-h">Sectors traded</div>
      <table class="ca-table">
        <thead><tr><th>Sector</th><th style="text-align:right">Trades</th><th style="text-align:right">P&amp;L</th></tr></thead>
        <tbody>${p.sectors.map(s => `
          <tr><td>${s.sector}</td><td style="text-align:right">${s.trades}</td><td style="text-align:right" class="${classOf(s.pnl)}">${fmtDollar(s.pnl, true)}</td></tr>
        `).join('')}</tbody>
      </table>
    `;
  }
  return `
    <div class="ca-customer-block">
      <div class="ca-cust-h">
        <div class="ca-cust-name">${cr.display_name}</div>
        <div class="ca-cust-cid">${cr.customer_id.slice(0,8)}</div>
      </div>
      <div class="ca-stat-row">${stats}</div>
      ${closedTable}
      ${sectorTable}
    </div>
  `;
}

function renderAggregate(agg){
  if (!agg) return '';
  const ft = agg.fleet_totals;
  let clusterHtml = '';
  if (agg.signal_clusters && agg.signal_clusters.length) {
    clusterHtml = '<div class="ca-section-h">⚠ Signal clusters (≥3 customers traded)</div>' +
      agg.signal_clusters.map(t => `
        <div class="ca-cluster">
          <div class="ca-cluster-header">${t.ticker} — ${t.customers} customers, ${t.trades} trades</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.5)">Net P&amp;L: <span class="${classOf(t.pnl)}">${fmtDollar(t.pnl, true)}</span></div>
        </div>
      `).join('');
  }
  let topTickers = '';
  if (agg.top_tickers && agg.top_tickers.length) {
    topTickers = `
      <div class="ca-section-h">Top tickers across fleet</div>
      <table class="ca-table">
        <thead><tr><th>Ticker</th><th style="text-align:right">Customers</th><th style="text-align:right">Trades</th><th style="text-align:right">P&amp;L</th></tr></thead>
        <tbody>${agg.top_tickers.slice(0,15).map(t => `
          <tr><td>${t.ticker}</td><td style="text-align:right">${t.customers}</td><td style="text-align:right">${t.trades}</td><td style="text-align:right" class="${classOf(t.pnl)}">${fmtDollar(t.pnl, true)}</td></tr>
        `).join('')}</tbody>
      </table>
    `;
  }
  let topSectors = '';
  if (agg.top_sectors && agg.top_sectors.length) {
    topSectors = `
      <div class="ca-section-h">Top sectors across fleet</div>
      <table class="ca-table">
        <thead><tr><th>Sector</th><th style="text-align:right">Customers</th><th style="text-align:right">Trades</th><th style="text-align:right">P&amp;L</th></tr></thead>
        <tbody>${agg.top_sectors.slice(0,10).map(s => `
          <tr><td>${s.sector}</td><td style="text-align:right">${s.customers}</td><td style="text-align:right">${s.trades}</td><td style="text-align:right" class="${classOf(s.pnl)}">${fmtDollar(s.pnl, true)}</td></tr>
        `).join('')}</tbody>
      </table>
    `;
  }
  return `
    <div class="ca-customer-block" style="border-color:rgba(0,245,212,0.2);background:rgba(0,245,212,0.02)">
      <div class="ca-cust-h"><div class="ca-cust-name" style="color:#00f5d4">Fleet aggregate</div></div>
      <div class="ca-stat-row">
        <div class="ca-stat"><div class="ca-stat-label">Active customers</div><div class="ca-stat-val">${ft.active_customers}</div></div>
        <div class="ca-stat"><div class="ca-stat-label">Trades opened</div><div class="ca-stat-val">${ft.trades_opened}</div></div>
        <div class="ca-stat"><div class="ca-stat-label">Trades closed</div><div class="ca-stat-val">${ft.trades_closed}</div></div>
        <div class="ca-stat"><div class="ca-stat-label">Realized P&amp;L</div><div class="ca-stat-val ${classOf(ft.realized_pnl)}">${fmtDollar(ft.realized_pnl, true)}</div></div>
      </div>
      ${clusterHtml}
      ${topTickers}
      ${topSectors}
    </div>
  `;
}

async function runCAReport(ev){
  ev.preventDefault();
  const start = document.getElementById('ca-start').value;
  const end   = document.getElementById('ca-end').value;
  if (!start || !end) return false;
  const checked = Array.from(document.querySelectorAll('#ca-customers input:checked')).map(cb=>cb.value);
  const body = {start, end, customer: checked.length ? checked : ['all']};

  const out = document.getElementById('ca-output');
  out.innerHTML = '<div class="ca-empty">Running report...</div>';

  try {
    const r = await fetch('/api/proxy/activity-report', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-Token': SECRET_TOKEN},
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (!r.ok || d.error) {
      out.innerHTML = '<div class="ca-empty" style="color:#ff4b6e">' + (d.error || ('HTTP ' + r.status)) + '</div>';
      return false;
    }
    let html = '<div class="ca-tools"><button onclick="caCopyJSON()">Copy JSON</button><button onclick="caDownloadCSV()">Download CSV</button></div>';
    html += '<div style="font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:10px;font-family:JetBrains Mono,monospace">' +
            d.meta.start + ' → ' + d.meta.end + ' · ' + d.meta.customer_count + ' customers · generated ' + d.meta.generated_at + '</div>';
    html += renderAggregate(d.aggregate);
    html += (d.customers || []).map(renderCustomerBlock).join('');
    out.innerHTML = html;
    window._caLastReport = d;
  } catch(e) {
    out.innerHTML = '<div class="ca-empty" style="color:#ff4b6e">' + e + '</div>';
  }
  return false;
}

function caCopyJSON(){
  if (!window._caLastReport) return;
  navigator.clipboard.writeText(JSON.stringify(window._caLastReport, null, 2));
}

function caDownloadCSV(){
  const r = window._caLastReport;
  if (!r) return;
  const rows = [['customer','ticker','sector','shares','entry','exit','pnl','ret_pct','days_held','exit_reason','opened_at','closed_at']];
  (r.customers || []).forEach(cr => {
    (cr.positions.closed || []).forEach(t => {
      rows.push([cr.display_name, t.ticker, t.sector, t.shares, t.entry, t.exit, t.pnl, t.ret_pct, t.days_held, t.exit_reason, t.opened_at, t.closed_at]);
    });
  });
  const csv = rows.map(r => r.map(c => '"' + String(c == null ? '' : c).replace(/"/g, '""') + '"').join(',')).join('\n');
  const blob = new Blob([csv], {type: 'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'activity-' + r.meta.start + '_' + r.meta.end + '.csv';
  a.click();
}

// ── COMPOSE MODAL (Activity Phase C, 2026-05-05) ─────────────────────
// Admin clicks the Message button on a customer row → modal opens
// with subject + body fields → POST to /api/proxy/admin/message-customer
// → message lands in admin_messages on shared DB. Customer-side surface
// (notification bell + read endpoints) handled by retail_portal.
function openComposeModal(customerId, customerName, customerEmail) {
  // Lazy-create modal once. State (selected customer) updated on each open.
  let modal = document.getElementById('ca-compose-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'ca-compose-modal';
    modal.innerHTML = `
      <div class="ca-cm-backdrop" onclick="closeComposeModal()"></div>
      <div class="ca-cm-panel" role="dialog" aria-modal="true" aria-labelledby="ca-cm-title">
        <div class="ca-cm-header">
          <div id="ca-cm-title" style="font-size:13px;font-weight:700">Message customer</div>
          <button class="ca-cm-close" onclick="closeComposeModal()" aria-label="Close">×</button>
        </div>
        <div class="ca-cm-body">
          <div class="ca-cm-recipient">
            <span style="font-size:9px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.06em">To</span>
            <div style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.88);margin-top:3px" id="ca-cm-to">—</div>
          </div>
          <input type="text" id="ca-cm-subject" maxlength="200" placeholder="Subject" autocomplete="off">
          <textarea id="ca-cm-body" maxlength="10000" rows="8" placeholder="Message…"></textarea>
          <div class="ca-cm-footer">
            <span id="ca-cm-status" style="font-size:10px;color:rgba(255,255,255,0.4)"></span>
            <button class="ca-cm-cancel" onclick="closeComposeModal()">Cancel</button>
            <button class="ca-cm-send" id="ca-cm-send-btn" onclick="sendComposeModal()">Send</button>
          </div>
        </div>
      </div>
    `;
    // Inject minimal styles inline so this works without a CSS dependency.
    const style = document.createElement('style');
    style.textContent = `
      #ca-compose-modal{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center}
      .ca-cm-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px)}
      .ca-cm-panel{position:relative;background:#0f1320;border:1px solid rgba(255,255,255,0.1);border-radius:10px;width:min(560px,92vw);box-shadow:0 18px 60px rgba(0,0,0,0.55)}
      .ca-cm-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.06)}
      .ca-cm-close{background:transparent;border:0;color:rgba(255,255,255,0.4);font-size:18px;cursor:pointer;line-height:1;padding:0 4px}
      .ca-cm-close:hover{color:rgba(255,255,255,0.88)}
      .ca-cm-body{padding:14px 18px;display:flex;flex-direction:column;gap:12px}
      .ca-cm-recipient{padding:8px 12px;background:rgba(255,255,255,0.03);border-radius:6px}
      #ca-cm-subject,#ca-cm-body{background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:9px 11px;color:rgba(255,255,255,0.92);font:inherit;font-size:12px;outline:none}
      #ca-cm-subject:focus,#ca-cm-body:focus{border-color:rgba(123,97,255,0.5)}
      #ca-cm-body{resize:vertical;min-height:140px;font-family:inherit}
      .ca-cm-footer{display:flex;align-items:center;gap:8px;justify-content:flex-end;padding-top:4px}
      .ca-cm-footer button{font:inherit;font-size:11px;padding:6px 14px;border-radius:6px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);font-weight:600;letter-spacing:0.02em}
      .ca-cm-cancel{background:transparent;color:rgba(255,255,255,0.5)}
      .ca-cm-cancel:hover{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.88)}
      .ca-cm-send{background:rgba(123,97,255,0.2);border-color:rgba(123,97,255,0.4);color:#b6a3ff}
      .ca-cm-send:hover{background:rgba(123,97,255,0.32)}
      .ca-cm-send:disabled{opacity:0.5;cursor:not-allowed}
    `;
    document.head.appendChild(style);
    document.body.appendChild(modal);
  }
  document.getElementById('ca-cm-to').textContent =
    (customerName || '(unnamed)') +
    (customerEmail && customerEmail !== '—' ? ' · ' + customerEmail : '') +
    ' · ' + (customerId.slice(0,8)+'…');
  modal.dataset.cid = customerId;
  document.getElementById('ca-cm-subject').value = '';
  document.getElementById('ca-cm-body').value = '';
  document.getElementById('ca-cm-status').textContent = '';
  document.getElementById('ca-cm-send-btn').disabled = false;
  modal.style.display = 'flex';
  setTimeout(() => document.getElementById('ca-cm-subject').focus(), 50);
}

function closeComposeModal() {
  const m = document.getElementById('ca-compose-modal');
  if (m) m.style.display = 'none';
}

async function sendComposeModal() {
  const m = document.getElementById('ca-compose-modal');
  const cid = m.dataset.cid || '';
  const subject = document.getElementById('ca-cm-subject').value.trim();
  const body = document.getElementById('ca-cm-body').value.trim();
  const status = document.getElementById('ca-cm-status');
  const btn = document.getElementById('ca-cm-send-btn');
  if (!subject || !body) {
    status.textContent = 'Subject + message body are both required.';
    status.style.color = '#ff8093';
    return;
  }
  btn.disabled = true;
  status.style.color = 'rgba(255,255,255,0.4)';
  status.textContent = 'Sending…';
  try {
    const r = await fetch('/api/proxy/admin/message-customer', {
      method: 'POST',
      headers: {'Content-Type':'application/json','X-Token':SECRET_TOKEN},
      body: JSON.stringify({customer_id: cid, subject, body}),
    });
    const d = await r.json();
    if (r.ok && d.ok) {
      status.style.color = '#00f5d4';
      status.textContent = 'Sent. Message id #' + d.id + '.';
      setTimeout(closeComposeModal, 800);
    } else {
      status.style.color = '#ff8093';
      status.textContent = 'Error: ' + (d.error || ('HTTP '+r.status));
      btn.disabled = false;
    }
  } catch(e) {
    status.style.color = '#ff8093';
    status.textContent = 'Network error: ' + e.message;
    btn.disabled = false;
  }
}
